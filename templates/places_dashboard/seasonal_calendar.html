<style>
    .equal-height-panel {
        height: 420px; 
        display: flex;
        flex-direction: column;
        box-sizing: border-box;
        overflow: hidden; 
    }


    .calendar-grid {
        display: grid;
        grid-template-columns: repeat(3, 1fr); 
        grid-template-rows: repeat(4, 1fr);    
        gap: 8px;                             
        flex: 1 1 auto; 
        min-height: 0;  
    }

    .month-square {
        width: 100%;
        height: 100%; 
        display: flex;
        flex-direction: column;
        align-items: center;
        justify-content: center;
        border-radius: 8px;
        transition: all 0.2s ease;
        background: var(--bg-card-2);
        border: 1px solid rgba(255, 255, 255, 0.06);
        padding: 2px !important;
    }

    @media (min-width: 992px) {
        .month-square {
            aspect-ratio: auto !important; 
        }
    }

    .month-square:hover { background: rgba(217, 164, 6, 0.1); border-color: var(--primary-color); }
    .month-square.active-square { background: #0d6efd !important; color: #fff !important; border-color: #0d6efd !important; box-shadow: 0 4px 15px rgba(13, 110, 253, 0.3); }
    .month-text { font-size: 0.85rem; line-height: 1.2; font-weight: 600; }
    .month-num { font-size: 0.7rem; opacity: 0.4; margin-top: 1px; }

    @media (max-width: 991px) {
        .equal-height-panel {
            height: auto !important; 
            min-height: fit-content !important;
            padding-bottom: 25px !important; 
            display: block !important; 
        }

        .calendar-grid {
            height: auto !important;
            grid-template-rows: repeat(4, auto) !important;
            gap: 10px !important;
            margin-bottom: 10px;
        }

        .month-square {
            aspect-ratio: 1.4 / 1 !important; 
            height: auto !important;
            padding: 10px 2px !important;
        }

        .month-text { font-size: 0.8rem !important; }
        .month-num { font-size: 0.65rem !important; }
    }
</style>

<div class="row g-4 mt-4">
    <div class="col-12 col-lg-6">
        <div class="p-4 bg-dark rounded-4 equal-height-panel border border-secondary border-opacity-25">
            <h5 class="mb-3 text-white opacity-75 fw-bold text-uppercase small text-center text-sm-start" style="letter-spacing: 1px;">
                📅 {{ _('Ճամփորդական Օրացույց') }}
            </h5>
            
            <div class="calendar-grid">
                {% for m_idx, m_name in months_hy.items() %}
                    <button type="button" 
                            class="month-square text-white btn border-0 {% if m_idx == current_month %}active-square{% endif %}"
                            hx-get="{{ url_for('places_dashboard.get_seasonal', month=m_idx) }}"
                            hx-target="#seasonal-list-display"
                            hx-trigger="click"
                            _="on click 
                                take .active-square from .month-square 
                                add .active-square to me">
                        <div class="month-text">{{ m_name }}</div>
                        <div class="month-num">{{ "%02d" | format(m_idx) }}</div>
                    </button>
                {% endfor %}
            </div>
        </div>
    </div>

    <div class="col-12 col-lg-6">
        <div class="p-4 bg-dark rounded-4 equal-height-panel border border-secondary border-opacity-25">
            <h5 class="mb-3 text-white opacity-75 fw-bold text-uppercase small" style="letter-spacing: 1px;">
                🌍 {{ _('Առաջարկվող Ուղղություններ') }}
            </h5>
            
            <div id="seasonal-list-display" 
                 class="overflow-auto flex-grow-1 pe-1"
                 style="scrollbar-width: none; -ms-overflow-style: none;"
                 hx-get="{{ url_for('places_dashboard.get_seasonal', month=current_month) }}" 
                 hx-trigger="load">
                
                <div class="h-100 d-flex align-items-center justify-content-center opacity-25">
                    <div class="spinner-border text-light spinner-border-sm" role="status"></div>
                </div>
                
            </div>
        </div>
    </div>

</div>
