document.body.addEventListener("htmx:afterOnLoad", function (event) {

        loadChartData(event.detail.xhr.responseText);
    }
});


function loadChartData(jsonText) {
    if (!jsonText || jsonText === "undefined" || jsonText === "") {
        console.warn("No chart data received. Skipping update.");
        return; 
    }
    try {
        const data = JSON.parse(jsonText);
        const wrapper = document.getElementById("chart-wrapper");
        const showBtn = document.getElementById("show-chart-btn");
        const hideBtn = document.getElementById("hide-chart-btn");

        // If no data exists, hide the chart and buttons
        if (!data.values || data.values.length === 0) {
            hideChart(); 
            return;
        }

        // Show the wrapper with a smooth transition
        wrapper.style.display = "block";
        
        
        const canvas = document.getElementById("categoryPieChart");
        
        // --- COOLER CHART STYLE: Doughnut ---
        if (window.pieChart) {
            window.pieChart.destroy(); // Clear old chart to redraw slices
        }

        window.pieChart = new Chart(canvas, {
            type: "doughnut", 
            data: {
                labels: data.labels,
                datasets: [{
                    data: data.values,
                    backgroundColor: [
                        "#6366f1", "#8b5cf6", "#ec4899", "#f43f5e", "#f59e0b", "#10b981"
                    ],
                    hoverOffset: 20,
                    borderWidth: 3,
                    borderColor: '#ffffff'
                }]
            },
            options: {
                cutout: '70%', // Modern "Ring" look
                plugins: {
                    legend: { position: 'bottom' }
                },
                animation: {
                    animateScale: true,
                    animateRotate: true
                }
            }
        });

        showBtn.style.display = "none";
        hideBtn.style.display = "inline-block";
    
    } catch (error) {
        console.error("Failed to parse chart JSON:", error)
    }
    
}


function hideChart() {
    const wrapper = document.getElementById("chart-wrapper");
    const showBtn = document.getElementById("show-chart-btn");
    const hideBtn = document.getElementById("hide-chart-btn");

    wrapper.style.display = "none";

    if (wrapper) wrapper.style.display = "none";
    if (window.pieChart) {
        window.pieChart.destroy();
        window.pieChart = null;
    }

    if (showBtn) showBtn.style.display = "inline-block";
    if (hideBtn) hideBtn.style.display = "none";
}


document.addEventListener('htmx:afterSwap', function(event) {
   
    if (event.detail.target.id === 'expenses_innerPart') {
        const chartWrapper = document.getElementById('chart-wrapper');
        const showBtn = document.getElementById('show-chart-btn');
        const hideBtn = document.getElementById('hide-chart-btn');
        
        
        if (chartWrapper && chartWrapper.style.display !== 'none') {
            if (window.pieChart) {
                window.pieChart.destroy();
                window.pieChart = null;
            }

            
            chartWrapper.style.display = 'none';
            showBtn.style.display = 'inline-block';
            hideBtn.style.display = 'none';
            
            setTimeout(() => {
                showBtn.click(); 
            }, 100); 
        }
    }
});
